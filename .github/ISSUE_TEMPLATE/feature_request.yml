name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Great. Please describe it clearly so we can understand the problem you're trying to solve.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or limitation that prompted this request.
      placeholder: "Example: When I have many pinned messages, there's no way to reorder them. I have to unpin and re-pin in the right order."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you imagine this working? Rough ideas are fine.
      placeholder: "Example: A drag-to-reorder handle on each pinned message in the admin panel."
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which area does this relate to?
      options:
        - User-facing page
        - Admin panel
        - Notifications
        - Internationalization (i18n)
        - Anti-spam / moderation
        - Deployment / configuration
        - Developer experience
        - Other
    validations:
      required: true

  - type: dropdown
    id: willing
    attributes:
      label: Would you be willing to submit a PR for this?
      options:
        - "Yes"
        - "Maybe, with guidance"
        - "No, just suggesting"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues and this has not been requested before
          required: true
