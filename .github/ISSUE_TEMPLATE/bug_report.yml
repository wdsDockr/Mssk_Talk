name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "Example: Clicking the 'Block' button does nothing, no error shown."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to admin panel
        2. Open a message group
        3. Click 'Block user'
        4. Nothing happens
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "The user should be blocked and the group should be marked accordingly."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which part of the app is affected?
      options:
        - User-facing page (index.html)
        - Admin panel (admin.html)
        - Notifications (Telegram / email)
        - Database / Supabase
        - Deployment / Cloudflare Pages
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and device
      placeholder: "Example: Chrome 123, macOS / Safari on iPhone 15"
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: Console errors (if any)
      description: Open browser DevTools → Console tab and paste any red errors here.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I am using the latest version of the code
          required: true
